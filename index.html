<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GigLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDeep: '#121212',
                        surface: '#1E1E1E',
                        accent: '#00E5FF',
                        accentHover: '#00B8CC',
                        textSecondary: '#B3B3B3',
                        borderDark: '#333333'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDeep text-white h-screen flex items-center justify-center font-sans overflow-hidden">

    <main class="bg-surface p-10 rounded-2xl border border-borderDark w-full max-w-md text-center shadow-2xl transform transition-all duration-300">
        
        <h1 class="text-5xl font-bold text-accent mb-3 tracking-tight">GigLite</h1>
        <p class="text-textSecondary mb-10 text-lg">Simplify your gig technicalities.</p>

        <div id="login-container">
            <button 
                id="google-login-btn"
                onclick="handleGoogleLogin()"
                class="w-full bg-white text-black flex items-center justify-center gap-3 py-3 px-6 rounded-lg font-semibold text-base hover:bg-gray-200 transition duration-200 focus:outline-none focus:ring-4 focus:ring-accent/50"
            >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Login with Google
            </button>
        </div>

        <div id="loading-state" class="hidden flex-col items-center justify-center py-4">
            <svg class="animate-spin h-8 w-8 text-accent mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-textSecondary animate-pulse">Mengautentikasi...</p>
        </div>

        <p id="error-message" class="hidden text-red-500 mt-4 text-sm"></p>

    </main>

    <script>
        /**
         * Fungsi ini mensimulasikan proses login asinkron dengan Google.
         * Untuk prototype HCI, kita menggunakan timeout agar terasa seperti sistem nyata.
         */
        function handleGoogleLogin() {
            // Ambil elemen DOM
            const loginBtn = document.getElementById('google-login-btn');
            const loadingState = document.getElementById('loading-state');
            const errorMessage = document.getElementById('error-message');

            // 1. Reset state (sembunyikan error, matikan tombol agar tidak di-klik 2 kali)
            errorMessage.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // 2. Tampilkan UI Loading
            loginBtn.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');

            // 3. Simulasi pemanggilan API (delay 1.5 detik)
            setTimeout(() => {
                // Simulasi logika sukses (kamu bisa ubah isSuccess = false untuk test error UI)
                const isSuccess = true; 

                if (isSuccess) {
                    // Jika sukses, simpan token/sesi dummy di localStorage
                    localStorage.setItem('giglite_session', 'dummy-token-12345');
                    
                    // Redirect ke halaman dashboard (ganti 'dashboard.html' sesuai file kerjamu)
                    // Menggunakan alert untuk prototype jika file belum ada
                    // alert("Login berhasil! Mengalihkan ke Dashboard...");
                    window.location.href = 'dashboard.html'; 
                } else {
                    // Jika gagal, kembalikan UI ke semula dan tampilkan pesan error
                    loadingState.classList.add('hidden');
                    loadingState.classList.remove('flex');
                    
                    loginBtn.classList.remove('hidden');
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    errorMessage.innerText = "Gagal terhubung dengan Google. Silakan coba lagi.";
                    errorMessage.classList.remove('hidden');
                }
            }, 1500);
        }

        /**
         * Pengecekan sesi saat halaman dimuat.
         * Jika user sudah login (token ada), langsung lempar ke dashboard.
         */
        window.onload = () => {
            const session = localStorage.getItem('giglite_session');
            if (session) {
                // Uncomment baris di bawah jika sudah membuat file dashboard.html
                // window.location.href = 'dashboard.html';
                console.log("User sudah login. Redirecting...");
            }
        };
    </script>
</body>
</html>
