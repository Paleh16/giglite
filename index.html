<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GigLite x Dapur Seni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spBase: '#000000',       
                        spSurface: '#121212',    
                        spElevated: '#181818',   
                        spHover: '#282828',      
                        spTextSec: '#A7A7A7',    
                        accent: '#00E5FF',       
                        accentHover: '#00B8CC'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS untuk logo putih menyala */
        .glowing-logo {
            filter: brightness(0) invert(1) drop-shadow(0 0 15px rgba(0, 229, 255, 0.6));
        }
    </style>
</head>
<body class="bg-spBase text-white h-screen flex items-center justify-center font-sans overflow-hidden relative">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-accent/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <main class="bg-spSurface/80 backdrop-blur-xl p-10 sm:p-12 rounded-2xl border border-spHover w-full max-w-md text-center shadow-2xl transform transition-all duration-300 relative z-10">
        
        <img src="LOGO DS FIX.png" alt="Dapur Seni Logo" class="w-24 h-24 mx-auto mb-6 object-contain glowing-logo">
        
        <h1 class="text-3xl font-extrabold tracking-tight mb-2">Masuk ke GigLite</h1>
        <p class="text-spTextSec mb-10 font-medium">Stage management for Dapur Seni.</p>

        <div id="login-container" class="space-y-4">
            <button 
                id="google-login-btn"
                onclick="handleGoogleLogin()"
                class="w-full bg-white text-black flex items-center justify-center gap-3 py-3.5 px-6 rounded-full font-bold text-base hover:scale-105 transition-transform duration-200"
            >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Lanjutkan dengan Google
            </button>
        </div>

        <div id="loading-state" class="hidden flex-col items-center justify-center py-4">
            <svg class="animate-spin h-8 w-8 text-accent mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-spTextSec font-medium animate-pulse">Menghubungkan ke Dapur Seni...</p>
        </div>

    </main>

    <script>
        function handleGoogleLogin() {
            const loginBtn = document.getElementById('google-login-btn');
            const loadingState = document.getElementById('loading-state');

            // Sembunyikan tombol, tampilkan loading
            loginBtn.parentElement.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');

            // Simulasi proses login
            setTimeout(() => {
                localStorage.setItem('giglite_session', 'active');
                window.location.href = 'dashboard.html'; 
            }, 1200);
        }

        window.onload = () => {
            // Cek jika sudah login, langsung ke dashboard
            const session = localStorage.getItem('giglite_session');
            if (session) {
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
