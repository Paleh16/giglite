<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GigLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDeep: '#121212', surface: '#1E1E1E', surfaceHover: '#2A2A2A',
                        accent: '#00E5FF', accentHover: '#00B8CC', textSecondary: '#B3B3B3',
                        borderDark: '#333333', danger: '#FF5722'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444444; }
    </style>
</head>
<body class="bg-bgDeep text-white h-screen flex font-sans overflow-hidden">

    <aside class="w-64 bg-surface border-r border-borderDark flex flex-col transition-transform duration-300 z-20 absolute md:relative h-full transform -translate-x-full md:translate-x-0" id="sidebar">
        <div class="p-6 border-b border-borderDark">
            <h2 class="text-2xl font-bold text-accent tracking-tight">GigLite</h2>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-surfaceHover text-accent rounded-lg font-semibold transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
        </nav>
        <div class="p-4 border-t border-borderDark">
            <button onclick="window.location.href='index.html'" class="w-full text-left px-4 py-3 text-danger hover:bg-surfaceHover rounded-lg font-medium transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-70 z-10 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="bg-surface border-b border-borderDark p-4 flex justify-between items-center md:hidden">
            <h2 class="text-xl font-bold text-accent">GigLite</h2>
            <button onclick="toggleSidebar()" class="text-textSecondary hover:text-white focus:outline-none">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="flex flex-col md:flex-row md:justify-between md:items-end mb-10 gap-6">
                <div>
                    <h1 class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight">Welcome back, <span class="text-accent">Performer!</span></h1>
                    <p class="text-textSecondary text-lg md:text-xl" id="dashboard-subtitle">Memuat jadwal...</p>
                </div>
                <button onclick="openCreateModal()" class="bg-accent hover:bg-accentHover text-black font-bold py-3.5 px-8 rounded-xl transition duration-300 shadow-[0_0_20px_rgba(0,229,255,0.3)] active:scale-95 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Create New Gig Schedule
                </button>
            </div>

            <div id="gigs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </main>

    <div id="create-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-surface border border-borderDark p-8 rounded-2xl w-11/12 max-w-md transform scale-95 transition-transform duration-300 shadow-2xl" id="create-modal-content">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-2xl font-bold text-accent">New Gig Schedule</h2>
                <button onclick="closeCreateModal()" class="text-textSecondary hover:text-white transition-colors bg-surfaceHover p-1 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-4 mb-8">
                <div>
                    <label class="block text-textSecondary text-sm font-bold uppercase mb-2">Event Name</label>
                    <input type="text" id="new-gig-name" placeholder="e.g. Campus Festival 2026" class="w-full bg-bgDeep text-white border border-borderDark rounded-xl p-3 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent">
                </div>
                <div>
                    <label class="block text-textSecondary text-sm font-bold uppercase mb-2">Event Date</label>
                    <input type="date" id="new-gig-date" class="w-full bg-bgDeep text-white border border-borderDark rounded-xl p-3 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent">
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-6 border-t border-borderDark">
                <button onclick="closeCreateModal()" class="px-6 py-2.5 border border-borderDark text-white hover:bg-surfaceHover rounded-xl transition-colors font-medium">Cancel</button>
                <button onclick="createNewGig()" class="px-6 py-2.5 bg-accent text-black font-bold hover:bg-accentHover rounded-xl transition-colors shadow-lg">Create Workspace</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. INISIALISASI DATABASE LOKAL (SEEDING) ---
        function initDatabase() {
            let gigs = localStorage.getItem('giglite_gigs');
            // Jika belum ada data sama sekali, kita buat data bawaan
            if (!gigs) {
                const initialData = [
                    { id: '1715000000000', name: 'WaguFast Pre-Event', date: '2026-05-15', status: 'draft', format: 'Full Band' },
                    { id: '1714000000000', name: 'Acoustic Night', date: '2026-05-04', status: 'finalized', format: 'Solo/Duo Setup' }
                ];
                localStorage.setItem('giglite_gigs', JSON.stringify(initialData));
            }
        }

        // --- 2. FUNGSI READ (RENDER CARDS) ---
        function renderGigs() {
            const container = document.getElementById('gigs-container');
            const subtitle = document.getElementById('dashboard-subtitle');
            container.innerHTML = ''; // Bersihkan kontainer
            
            let gigs = JSON.parse(localStorage.getItem('giglite_gigs')) || [];
            
            subtitle.innerText = `You have ${gigs.length} events coming up.`;

            gigs.forEach(gig => {
                const isFinalized = gig.status === 'finalized';
                const statusColor = isFinalized ? 'text-green-500 bg-green-500/20 border-green-500/30' : 'text-yellow-500 bg-yellow-500/20 border-yellow-500/30';
                
                // Card Template
                const cardHTML = `
                    <div class="bg-surface border border-borderDark hover:border-accent p-7 rounded-2xl transition duration-300 transform hover:-translate-y-2 group flex flex-col relative">
                        
                        <button onclick="deleteGig('${gig.id}', event)" class="absolute top-4 right-4 text-textSecondary hover:text-danger p-2 bg-bgDeep rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10" title="Delete Gig">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>

                        <div class="flex justify-between items-start gap-4 mb-6 cursor-pointer" onclick="openWorkspace('${gig.id}')">
                            <div class="flex-1">
                                <h3 class="text-2xl font-bold group-hover:text-accent transition-colors mb-2 leading-tight pr-8">${gig.name}</h3>
                                <p class="text-textSecondary flex items-center gap-2 text-sm">
                                    <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${gig.date}
                                </p>
                            </div>
                            <span class="shrink-0 text-[10px] uppercase font-black px-2.5 py-1 rounded-full border mt-1 ${statusColor}">${gig.status}</span>
                        </div>

                        <div class="border-t border-borderDark pt-5 flex justify-between items-center mt-auto">
                            <button onclick="toggleStatus('${gig.id}')" class="text-xs font-bold uppercase border px-3 py-1 rounded ${isFinalized ? 'border-borderDark text-textSecondary hover:text-white' : 'border-accent text-accent hover:bg-accent/10'} transition-colors">
                                ${isFinalized ? 'Mark as Draft' : 'Mark as Finalized'}
                            </button>

                            <button onclick="openWorkspace('${gig.id}')" class="text-accent font-bold text-sm flex items-center gap-1 group-hover:gap-2 transition-all">
                                ${isFinalized ? 'View Export' : 'Edit Rider'} <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            // Tambahkan Card "Create New" di akhir
            const newCardHTML = `
                <div onclick="openCreateModal()" class="border-2 border-dashed border-borderDark hover:border-accent bg-transparent p-7 rounded-2xl transition duration-300 flex flex-col items-center justify-center text-center cursor-pointer min-h-[200px] group">
                    <div class="bg-surface p-5 rounded-full mb-4 group-hover:bg-accent/10 transition-colors">
                        <svg class="w-8 h-8 text-textSecondary group-hover:text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <p class="text-textSecondary group-hover:text-white font-bold transition-colors">Schedule New Gig</p>
                </div>
            `;
            container.innerHTML += newCardHTML;
        }

        // --- 3. FUNGSI CREATE ---
        function createNewGig() {
            const name = document.getElementById('new-gig-name').value;
            const date = document.getElementById('new-gig-date').value;

            if(!name || !date) { alert("Mohon isi Nama Event dan Tanggal!"); return; }

            // Baca array saat ini
            let gigs = JSON.parse(localStorage.getItem('giglite_gigs')) || [];
            
            // Buat objek baru dengan ID unik berbasis waktu (timestamp)
            const newGigId = Date.now().toString();
            const newGig = {
                id: newGigId,
                name: name,
                date: date,
                status: 'draft',
                format: 'Band Setup' // Default format
            };

            // Simpan ke array
            gigs.push(newGig);
            localStorage.setItem('giglite_gigs', JSON.stringify(gigs));

            // Set gig aktif dan pindah ke workspace
            localStorage.setItem('active_gig_id', newGigId);
            window.location.href = 'workspace.html';
        }

        // --- 4. FUNGSI DELETE ---
        function deleteGig(id, event) {
            event.stopPropagation(); // Mencegah klik menyebar ke card (agar tidak membuka workspace)
            
            if(confirm("Apakah kamu yakin ingin menghapus jadwal ini? Data tidak dapat dikembalikan.")) {
                let gigs = JSON.parse(localStorage.getItem('giglite_gigs')) || [];
                // Filter array: buang gig yang ID-nya sama dengan yang dihapus
                gigs = gigs.filter(gig => gig.id !== id);
                localStorage.setItem('giglite_gigs', JSON.stringify(gigs));
                
                renderGigs(); // Render ulang tampilan
            }
        }

        // --- 5. FUNGSI UPDATE STATUS ---
        function toggleStatus(id) {
            let gigs = JSON.parse(localStorage.getItem('giglite_gigs')) || [];
            // Cari gig berdasarkan ID
            let gigIndex = gigs.findIndex(gig => gig.id === id);
            
            if (gigIndex !== -1) {
                // Balikkan status
                gigs[gigIndex].status = gigs[gigIndex].status === 'draft' ? 'finalized' : 'draft';
                localStorage.setItem('giglite_gigs', JSON.stringify(gigs));
                renderGigs(); // Render ulang tampilan
            }
        }

        // --- NAVIGASI ---
        function openWorkspace(id) {
            let gigs = JSON.parse(localStorage.getItem('giglite_gigs')) || [];
            let targetGig = gigs.find(g => g.id === id);
            
            localStorage.setItem('active_gig_id', id);

            if (targetGig && targetGig.status === 'finalized') {
                window.location.href = 'export.html'; // Jika final, langsung ke Export
            } else {
                window.location.href = 'workspace.html';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

        // Modal Logic
        const createModal = document.getElementById('create-modal');
        const createModalContent = document.getElementById('create-modal-content');
        function openCreateModal() { createModal.classList.remove('hidden'); setTimeout(() => { createModal.classList.remove('opacity-0'); createModalContent.classList.remove('scale-95'); }, 10); }
        function closeCreateModal() { createModal.classList.add('opacity-0'); createModalContent.classList.add('scale-95'); setTimeout(() => { createModal.classList.add('hidden'); }, 300); }

        // --- JALANKAN SAAT HALAMAN DIMUAT ---
        window.onload = () => {
            initDatabase();
            renderGigs();
        };
    </script>
</body>
</html>
